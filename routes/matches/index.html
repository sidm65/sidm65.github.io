<section v-if="!store.profileReady.value" class="card page narrow">
    <h2>Finish your profile first</h2>
    <p class="page-copy">Save your profile before posting matches or joining the lobby.</p>
    <router-link class="button-link" to="/profile">Go to profile</router-link>
</section>

<section v-else class="page-grid">
    <section class="card page">
        <div class="section-head">
            <div>
                <h2>Post Match</h2>
                <p class="page-copy">Create a new tennis or pickleball meetup.</p>
            </div>
        </div>
        <form @submit.prevent="store.postMatch()">
            <label class="field">
                <span>Sport</span>
                <select v-model="store.matchForm.value.sport">
                    <option value="tennis">Tennis</option>
                    <option value="pickleball">Pickleball</option>
                </select>
            </label>
            <label class="field">
                <span>Location</span>
                <select v-model="store.matchForm.value.location">
                    <option value="MIT">MIT</option>
                    <option value="Harvard">Harvard</option>
                </select>
            </label>
            <div class="split">
                <label class="field">
                    <span>Rating Type</span>
                    <select v-model="store.matchForm.value.ratingType">
                        <option value="UTR">UTR</option>
                        <option value="UTR-P">UTR-P</option>
                    </select>
                </label>
                <label class="field">
                    <span>Rating (1-16)</span>
                    <input v-model.number="store.matchForm.value.rating" type="number" min="1" max="16" step="0.1" placeholder="6.5" />
                </label>
            </div>
            <label class="field">
                <span>Format</span>
                <select v-model="store.matchForm.value.format">
                    <option value="singles">Singles</option>
                    <option value="doubles">Doubles</option>
                </select>
            </label>
            <div class="split">
                <label class="field">
                    <span>Date</span>
                    <input v-model="store.matchForm.value.date" type="date" />
                </label>
                <label class="field">
                    <span>Time</span>
                    <input v-model="store.matchForm.value.time" type="time" />
                </label>
            </div>
            <label class="field">
                <span>Cost Per Spot ($)</span>
                <input v-model.number="store.matchForm.value.costPerSpot" type="number" min="0" step="1" placeholder="12" />
            </label>
            <button :disabled="!store.canPostMatch.value || store.postingMatch.value">
                {{ store.postingMatch.value ? "Posting..." : "Post Match" }}
            </button>
        </form>
    </section>

    <section class="card page">
        <div class="section-head">
            <div>
                <h2>Match Lobby</h2>
                <p class="page-copy">Find open games and reserve a spot.</p>
            </div>
        </div>
        <p v-if="store.matchesLoading.value"><em>Loading matches...</em></p>
        <p v-else-if="!store.matchCards.value.length" class="empty">No matches posted yet.</p>
        <div v-else class="stack">
            <match-card
                v-for="match in store.matchCards.value"
                :key="match.url"
                :match="match"
                :pending-match-id="store.pendingMatchId.value"
                :joining-match-id="store.joiningMatchId.value"
                :deleting-match-id="store.deletingMatchId.value"
                @select-match="store.pendingMatchId.value = $event"
                @join-match="store.joinMatch($event)"
                @delete-match="store.deleteMatch($event)"
            ></match-card>
        </div>
    </section>
</section>
